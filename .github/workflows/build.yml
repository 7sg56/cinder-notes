name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Frontend checks ──

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Node Setup
        uses: ./.github/actions/node-setup

      - name: Lint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Node Setup
        uses: ./.github/actions/node-setup

      - name: Typecheck
        run: npm run typecheck

  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Node Setup
        uses: ./.github/actions/node-setup

      - name: Check formatting
        run: npm run format:check

  build:
    name: Build (Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Node Setup
        uses: ./.github/actions/node-setup

      - name: Build
        run: npm run build

  # ── Tauri build (only when src-tauri/ changes) ──

  check-tauri-changes:
    name: Check Tauri Changes
    runs-on: ubuntu-latest
    outputs:
      tauri_changed: ${{ steps.filter.outputs.tauri }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check for src-tauri changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            tauri:
              - 'src-tauri/**'

  tauri-build:
    name: Build (Tauri)
    needs: [build, check-tauri-changes]
    if: needs.check-tauri-changes.outputs.tauri_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Node Setup
        uses: ./.github/actions/node-setup

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Build Tauri app
        run: npm run tauri:build