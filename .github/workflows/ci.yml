# The Orchestrator

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml

  tests:
    name: Tests
    uses: ./.github/workflows/tests.yml

  verify-pr:
    name: verify-pr          # Must match job name in the protection rules
    runs-on: ubuntu-latest
    needs: [build, tests]
    if: always()             
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.build.result }}" == "success" && "${{ needs.tests.result }}" == "success" ]]; then
            echo "✅ All checks passed"
            exit 0
          else
            echo "❌ build=${{ needs.build.result }}  tests=${{ needs.tests.result }}"
            exit 1
          fi