# Tests include playwright, vitest & rust-toolchain

name: Tests

on:
  workflow_call:

jobs:
  # Rust backend tests
  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # id exposed so the cache key can include the resolved toolchain version.
      - uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-test-${{ runner.os }}-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-test-${{ runner.os }}-${{ steps.rust-toolchain.outputs.cachekey }}-

      - run: cargo test --manifest-path src-tauri/Cargo.toml

  # React component tests (Vitest + RTL)
  test-react:
    name: React Component Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/node-setup
      - run: npm run test:ui

  # Playwright E2E tests
  test-e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/node-setup

      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-chromium-
            playwright-${{ runner.os }}-

      # Cache miss: download browser + install OS-level dependencies in one shot.
      - name: Install Playwright browsers (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # Cache hit: browsers are already on disk; only OS deps need installing.
      # This skips the browser download (~150 MB) while keeping system libs current.
      - name: Install Playwright system dependencies (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14