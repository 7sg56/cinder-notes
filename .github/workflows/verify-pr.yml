name: Verify PR

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  verify-all-checks:
    name: Verify All Checks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Wait for required workflows
        id: wait
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          REPO: ${{ github.repository }}
        run: |
          # Wait for Tests and Build workflows to complete
          echo "Waiting for all required workflows to complete..."

          required_workflows=("Tests" "Build")
          all_passed=true

          for workflow in "${required_workflows[@]}"; do
            echo "Waiting for $workflow workflow..."
            timeout=3600  # 60 minutes
            elapsed=0
            interval=15

            while [ $elapsed -lt $timeout ]; do
              status=$(gh api \
                --method GET \
                -H "Accept: application/vnd.github+json" \
                "repos/$REPO/commits/$PR_SHA/check-runs?check_name=$workflow" \
                --jq '.check_runs[0].conclusion // "running"' 2>/dev/null || echo "running")

              if [ "$status" = "success" ]; then
                echo "✓ $workflow passed"
                break
              elif [ "$status" = "failure" ]; then
                echo "✗ $workflow failed"
                all_passed=false
                break
              elif [ "$status" = "skipped" ]; then
                echo "⊘ $workflow was skipped"
                break
              fi

              sleep $interval
              elapsed=$((elapsed + interval))
            done

            if [ $elapsed -ge $timeout ]; then
              echo "✗ $workflow timed out"
              all_passed=false
            fi
          done

          if [ "$all_passed" = true ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Create summary check
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.wait.outputs.status }}';
            const sha = context.payload.pull_request?.head.sha || context.sha;

            const result = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'verify-pr',
              head_sha: sha,
              status: 'completed',
              conclusion: status === 'success' ? 'success' : 'failure',
              output: {
                title: status === 'success' ? 'All checks passed' : 'Some checks failed',
                summary: status === 'success'
                  ? '✅ All required workflows (Tests, Build) completed successfully.'
                  : '❌ One or more required workflows failed. Please check the individual workflow runs.',
              },
            });

            console.log('Created check:', result.data);