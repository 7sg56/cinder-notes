name: Verify PR

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  verify-all-checks:
    name: Verify All Checks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Wait for required workflows
        id: wait
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          REPO: ${{ github.repository }}
        run: |
          # Wait for Tests and Build workflows to complete
          echo "Waiting for all required workflows to complete..."

          # Map workflow file paths to their display names
          declare -A workflows
          workflows["tests.yml"]="Tests"
          workflows["build.yml"]="Build"

          all_passed=true

          for workflow_file in "tests.yml" "build.yml"; do
            workflow_name="${workflows[$workflow_file]}"
            echo "Waiting for $workflow_name ($workflow_file)..."
            timeout=3600  # 60 minutes
            elapsed=0
            interval=15

            while [ $elapsed -lt $timeout ]; do
              # Use workflow runs API, filtered by event sha
              run_data=$(gh api \
                --method GET \
                -H "Accept: application/vnd.github+json" \
                "repos/$REPO/actions/runs?event=pull_request&head_sha=$PR_SHA&per_page=30" \
                --jq ".workflow_runs[] | select(.name == \"$workflow_name\")" 2>/dev/null || echo "")

              if [ -n "$run_data" ]; then
                status=$(echo "$run_data" | jq -r '.status // "queued"')
                conclusion=$(echo "$run_data" | jq -r '.conclusion // ""')

                if [ "$status" = "completed" ]; then
                  if [ "$conclusion" = "success" ]; then
                    echo "✓ $workflow_name passed"
                    break
                  elif [ "$conclusion" = "failure" ] || [ "$conclusion" = "timed_out" ]; then
                    echo "✗ $workflow_name failed ($conclusion)"
                    all_passed=false
                    break
                  elif [ "$conclusion" = "cancelled" ]; then
                    echo "⊘ $workflow_name was cancelled"
                    all_passed=false
                    break
                  elif [ "$conclusion" = "skipped" ]; then
                    echo "⊘ $workflow_name was skipped"
                    break
                  fi
                fi
              fi

              sleep $interval
              elapsed=$((elapsed + interval))
            done

            if [ $elapsed -ge $timeout ]; then
              echo "✗ $workflow_name timed out"
              all_passed=false
            fi
          done

          if [ "$all_passed" = true ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Create summary check
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.wait.outputs.status }}';
            const sha = context.payload.pull_request?.head.sha || context.sha;

            const result = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'verify-pr',
              head_sha: sha,
              status: 'completed',
              conclusion: status === 'success' ? 'success' : 'failure',
              output: {
                title: status === 'success' ? 'All checks passed' : 'Some checks failed',
                summary: status === 'success'
                  ? '✅ All required workflows (Tests, Build) completed successfully.'
                  : '❌ One or more required workflows failed. Please check the individual workflow runs.',
              },
            });

            console.log('Created check:', result.data);